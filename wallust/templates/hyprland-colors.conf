# Generated by wallust
$wallust_bg = rgba({{background | strip}}ee)
$wallust_fg = rgba({{foreground | strip}}ff)
$wallust_accent = rgba({{color7 | strip}}ff)
$wallust_accent2 = rgba({{color8 | strip}}ff)
$wallust_urgent = rgba({{color8 | strip}}ff)

general {
    col.active_border = $wallust_accent $wallust_accent2 45deg
    col.inactive_border = rgba({{color0 | strip}}aa)
}

decoration {
    shadow {
        color = rgba({{background | strip}}ee)
    }
}
