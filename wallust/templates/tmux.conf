# Generated by wallust
# Mirrors Neovim: transparent canvas, quiet surfaces, one active accent.
set -g status-style "bg=default,fg={{foreground}}"
set -g status-left "#[bg={{color3}},fg={{color0}},bold] #{?client_prefix,COMMAND,#S} #[default]"
set -g status-right "#[fg={{color8}}]#{b:pane_current_path}  #[fg={{color3}}]│ #[fg={{foreground}}]#{user}@#H  #[fg={{color3}}]│ #[fg={{foreground}}]%a %d %b  %H:%M "

set -g window-status-format "#[fg={{color8}}] #I #W#{?window_zoomed_flag, 󰊓,} "
set -g window-status-current-format "#[bg={{color0}},fg={{color3}},bold] #I #W#{?window_zoomed_flag, 󰊓,} "
set -g window-status-last-style "fg={{foreground}}"
set -g window-status-activity-style "fg={{color3}},bold"
set -g window-status-bell-style "fg={{color1}},bold"

set -g pane-border-style "fg={{color8}}"
set -g pane-active-border-style "fg={{color3}}"
set -g display-panes-colour "{{color8}}"
set -g display-panes-active-colour "{{color3}}"

set -g message-style "bg={{color0}},fg={{foreground}}"
set -g message-command-style "bg={{color3}},fg={{color0}},bold"
set -g mode-style "bg={{color3}},fg={{color0}},bold"
set -g clock-mode-colour "{{color3}}"
set -g popup-style "bg={{color0}},fg={{foreground}}"
set -g popup-border-style "fg={{color3}}"
set -g menu-style "bg={{color0}},fg={{foreground}}"
set -g menu-selected-style "bg={{color3}},fg={{color0}},bold"
set -g menu-border-style "fg={{color3}}"
