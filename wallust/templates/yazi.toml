[filetype]
rules = [
  { mime = "image/*", fg = "{{color3}}" },
  { mime = "{audio,video}/*", fg = "{{color5}}" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "{{color1}}" },
  { mime = "application/{pdf,doc,rtf}", fg = "{{color6}}" },
  { mime = "vfs/{absent,stale}", fg = "{{color8}}" },
  { url = "*", is = "orphan", bg = "{{color1}}" },
  { url = "*", is = "exec", fg = "{{color2}}" },
  { url = "*", is = "dummy", bg = "{{color1}}" },
  { url = "*/", is = "dummy", bg = "{{color1}}" },
  { url = "*/", fg = "{{color6}}" },
]
